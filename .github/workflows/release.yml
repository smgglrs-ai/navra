name: Release

on:
  push:
    tags:
      - 'v[0-9]+.*'

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create.outputs.upload_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        run: cargo install git-cliff

      - name: Generate release notes
        run: git-cliff --latest --strip header > RELEASE_NOTES.md

      - name: Create GitHub Release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}

  build-linux:
    name: Build ${{ matrix.archive_suffix }}
    needs: create-release
    runs-on: ubuntu-latest
    container: registry.fedoraproject.org/fedora:44
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            archive_suffix: linux-x86_64
            embedded_feature: embedded-cuda
          - target: aarch64-unknown-linux-gnu
            archive_suffix: linux-aarch64
            use_cross: true
            embedded_feature: embedded
    steps:
      - name: Install build dependencies
        run: dnf install -y gcc gcc-c++ make rust cargo alsa-lib-devel pkg-config protobuf-compiler git-core podman

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binaries
        run: |
          BUILD_CMD="${{ matrix.use_cross && 'cross' || 'cargo' }}"
          $BUILD_CMD build --release --target ${{ matrix.target }} --bin navra --features ${{ matrix.embedded_feature }}
          $BUILD_CMD build --release --target ${{ matrix.target }} --bin navra-agent

      - name: Package
        run: |
          VERSION="${{ github.ref_name }}"
          TARGET_DIR="target/${{ matrix.target }}/release"
          for bin in navra navra-agent; do
            mkdir -p "dist-${bin}"
            cp "${TARGET_DIR}/${bin}" "dist-${bin}/"
            cp LICENSE README.md "dist-${bin}/"
            ARCHIVE="${bin}-${VERSION}-${{ matrix.archive_suffix }}.tar.gz"
            tar czf "${ARCHIVE}" -C "dist-${bin}" .
            sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          done

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            navra-*.tar.gz
            navra-*.tar.gz.sha256

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "navra-*.tar.gz"

  build-macos:
    name: Build ${{ matrix.archive_suffix }}
    needs: create-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-13
            archive_suffix: darwin-x86_64
            embedded_feature: embedded-metal
          - target: aarch64-apple-darwin
            runner: macos-14
            archive_suffix: darwin-aarch64
            embedded_feature: embedded-metal
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install macOS build dependencies
        run: brew install protobuf

      - name: Build binaries
        run: |
          cargo build --release --target ${{ matrix.target }} --bin navra --features ${{ matrix.embedded_feature }}
          cargo build --release --target ${{ matrix.target }} --bin navra-agent

      - name: Package
        run: |
          VERSION="${{ github.ref_name }}"
          TARGET_DIR="target/${{ matrix.target }}/release"
          for bin in navra navra-agent; do
            mkdir -p "dist-${bin}"
            cp "${TARGET_DIR}/${bin}" "dist-${bin}/"
            cp LICENSE README.md "dist-${bin}/"
            ARCHIVE="${bin}-${VERSION}-${{ matrix.archive_suffix }}.tar.gz"
            tar czf "${ARCHIVE}" -C "dist-${bin}" .
            shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          done

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            navra-*.tar.gz
            navra-*.tar.gz.sha256

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "navra-*.tar.gz"

  update-changelog:
    name: Update Changelog
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Install git-cliff
        run: cargo install git-cliff

      - name: Regenerate CHANGELOG.md
        run: git-cliff --output CHANGELOG.md

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "docs: update CHANGELOG.md for ${{ github.ref_name }}"
          git push
