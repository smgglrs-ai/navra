name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    container: rust:1.96-bookworm

    steps:
      - name: Install system dependencies
        run: apt-get update && apt-get install -y libasound2-dev pkg-config protobuf-compiler

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install components
        run: rustup component add rustfmt clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --no-default-features -- -D warnings

      - name: Test (no ONNX — ORT binary requires host glibc match)
        run: cargo test --workspace --exclude navra-server --no-default-features

      - name: Docs
        run: cargo doc --no-deps --no-default-features

  build:
    name: Build (release)
    runs-on: ubuntu-latest
    container: rust:1.96-bookworm

    steps:
      - name: Install system dependencies
        run: apt-get update && apt-get install -y libasound2-dev pkg-config protobuf-compiler

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build release (no ONNX — ORT binary requires host glibc match)
        run: cargo build --release --no-default-features
