name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  PII_NER_REPO: protectai/bert-base-NER-onnx
  PII_NER_DIR: /github/home/.local/share/navra/models/pii-ner

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    container: registry.fedoraproject.org/fedora:44

    steps:
      - name: Install build dependencies
        run: dnf install -y gcc gcc-c++ make rust cargo clippy rustfmt alsa-lib-devel pkg-config protobuf-compiler git-core

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-fedora44-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-fedora44-cargo-

      - name: Cache PII NER model
        uses: actions/cache@v4
        with:
          path: ${{ env.PII_NER_DIR }}
          key: pii-ner-model-${{ env.PII_NER_REPO }}

      - name: Download PII NER model
        run: |
          mkdir -p "$PII_NER_DIR"
          for file in model.onnx tokenizer.json; do
            if [ ! -f "$PII_NER_DIR/$file" ]; then
              echo "Downloading $file ..."
              curl -sL "https://huggingface.co/$PII_NER_REPO/resolve/main/$file" -o "$PII_NER_DIR/$file"
            else
              echo "$file already cached"
            fi
          done

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test --workspace --exclude navra-server

      - name: Docs
        run: cargo doc --no-deps

  build:
    name: Build (release)
    runs-on: ubuntu-latest
    container: registry.fedoraproject.org/fedora:44

    steps:
      - name: Install build dependencies
        run: dnf install -y gcc gcc-c++ make rust cargo alsa-lib-devel pkg-config protobuf-compiler git-core

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-fedora44-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-fedora44-cargo-release-

      - name: Build release
        run: cargo build --release
