name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  ORT_VERSION: "1.20.1"
  ORT_LIB_PATH: /opt/onnxruntime/lib
  ORT_PREFER_DYNAMIC_LINK: "1"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ONNX Runtime
        run: |
          curl -fsSL https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION}.tgz \
            | sudo tar xz -C /opt
          sudo mv /opt/onnxruntime-linux-x64-${ORT_VERSION} /opt/onnxruntime

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy -- -W warnings
        env:
          LD_LIBRARY_PATH: /opt/onnxruntime/lib

      - name: Build
        run: cargo build
        env:
          LD_LIBRARY_PATH: /opt/onnxruntime/lib

      - name: Test
        run: cargo test
        env:
          LD_LIBRARY_PATH: /opt/onnxruntime/lib
