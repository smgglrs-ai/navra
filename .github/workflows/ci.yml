name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    container: registry.fedoraproject.org/fedora:44

    steps:
      - name: Install build dependencies
        run: dnf install -y gcc gcc-c++ make rust cargo clippy rustfmt alsa-lib-devel pkg-config protobuf-compiler git-core

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-fedora44-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-fedora44-cargo-

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test --workspace --exclude navra-server

      - name: Docs
        run: cargo doc --no-deps

  build:
    name: Build (release)
    runs-on: ubuntu-latest
    container: registry.fedoraproject.org/fedora:44

    steps:
      - name: Install build dependencies
        run: dnf install -y gcc gcc-c++ make rust cargo alsa-lib-devel pkg-config protobuf-compiler git-core

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-fedora44-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-fedora44-cargo-release-

      - name: Build release
        run: cargo build --release
