name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    container: registry.access.redhat.com/ubi10/ubi:latest

    steps:
      - name: Install build dependencies
        run: |
          dnf install -y gcc make rust cargo glibc-static \
            alsa-lib-devel pkg-config git-core && \
          dnf clean all

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install rustfmt and clippy
        run: rustup component add rustfmt clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-ubi-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-ubi-cargo-

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test --workspace --exclude navra-server

      - name: Docs
        run: cargo doc --no-deps

  build:
    name: Build (release)
    runs-on: ubuntu-latest
    container: registry.access.redhat.com/ubi10/ubi:latest

    steps:
      - name: Install build dependencies
        run: |
          dnf install -y gcc make rust cargo glibc-static \
            alsa-lib-devel pkg-config git-core && \
          dnf clean all

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-ubi-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-ubi-cargo-release-

      - name: Build release
        run: cargo build --release
