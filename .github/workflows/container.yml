name: Container

on:
  push:
    branches: [main]
    tags:
      - 'v[0-9]+.*'
    paths:
      - 'navra-*/src/**'
      - 'navra-*/Cargo.toml'
      - 'Dockerfile.*'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/container.yml'
  pull_request:
    branches: [main]
    paths:
      - 'navra-*/src/**'
      - 'navra-*/Cargo.toml'
      - 'Dockerfile.*'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/container.yml'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: navra-agent
            dockerfile: Dockerfile.agent
            verify: true
          - image: navra-agent-full
            dockerfile: Dockerfile.agent-full
            verify: false
          - image: navra-mcp-filesystem
            dockerfile: Dockerfile.mcp-filesystem
            verify: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

      - name: Pull image for verification
        if: matrix.verify && github.event_name != 'pull_request'
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}"
          docker pull "${IMAGE}:${{ steps.meta.outputs.version }}"
          echo "VERIFY_TAG=${IMAGE}:${{ steps.meta.outputs.version }}" >> "$GITHUB_ENV"

      - name: Set PR verify tag
        if: matrix.verify && github.event_name == 'pull_request'
        run: echo "VERIFY_TAG=${{ fromJSON(steps.meta.outputs.json).tags[0] }}" >> "$GITHUB_ENV"

      - name: Verify image size
        if: matrix.verify
        run: |
          SIZE=$(docker image inspect "${VERIFY_TAG}" --format '{{ .Size }}')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Image size: ${SIZE_MB}MB"
          if [ "$SIZE" -gt 20971520 ]; then
            echo "::error::Image exceeds 20MB limit (${SIZE_MB}MB)"
            exit 1
          fi

      - name: Verify no shell in image
        if: matrix.verify
        run: |
          if docker run --rm --entrypoint /bin/sh "${VERIFY_TAG}" -c "echo pwned" 2>/dev/null; then
            echo "::error::Shell found in image!"
            exit 1
          fi
          echo "No shell found — image is shell-less"

      - name: Verify static binary
        if: matrix.verify
        run: |
          docker create --name verify "${VERIFY_TAG}"
          docker cp verify:/usr/local/bin/navra-agent /tmp/navra-agent
          docker rm verify
          file /tmp/navra-agent
          if ldd /tmp/navra-agent 2>&1 | grep -q "not a dynamic"; then
            echo "Binary is statically linked"
          else
            echo "::error::Binary is dynamically linked"
            exit 1
          fi

      - name: Smoke test
        if: matrix.verify
        run: |
          OUTPUT=$(docker run --rm "${VERIFY_TAG}" 2>&1 || true)
          if echo "$OUTPUT" | grep -q "NAVRA_ENDPOINT"; then
            echo "Smoke test passed — agent reports missing env var"
          else
            echo "::error::Unexpected output: $OUTPUT"
            exit 1
          fi

      - name: Trivy vulnerability scan
        if: matrix.verify
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.VERIFY_TAG }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
