[package]
name = "navra-safety-hooks"
description = "Content hooks and integrity monitoring for the navra gateway"
homepage.workspace = true
repository.workspace = true
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
publish = false

[features]
default = ["onnx"]
onnx = ["dep:ort", "dep:ndarray", "dep:tokenizers", "navra-model/onnx", "navra-safety/onnx"]

[dependencies]
navra-safety = { path = "../navra-safety", default-features = false }
navra-auth = { path = "../navra-auth", default-features = false }
navra-protocol = { path = "../navra-protocol" }
navra-model = { path = "../navra-model", default-features = false }
anyhow = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
dirs = "6"
glob = "0.3"
regex-lite = "0.1"
serde_yaml = "0.9"
schemars = { workspace = true }
htmd = "0.1"
sha2 = "0.10"
hex = "0.4"
ort = { version = "2.0.0-rc.12", default-features = false, features = ["ndarray", "std"], optional = true }
ndarray = { version = "0.17", optional = true }
tokenizers = { version = "0.22", default-features = false, features = ["onig"], optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["test-util", "macros"] }
tempfile = "3"
toml = "0.8"

[lints]
workspace = true
