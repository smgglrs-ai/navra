[package]
name = "navra-security"
description = "Facade: re-exports navra-auth + navra-safety"
homepage.workspace = true
repository.workspace = true
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[dependencies]
navra-auth = { path = "../navra-auth" }
navra-core = { path = "../navra-core", default-features = false }
navra-safety-hooks = { path = "../navra-safety-hooks", default-features = false }
serde = { workspace = true }
serde_json = { workspace = true }

[features]
default = ["onnx"]
onnx = ["navra-core/onnx", "navra-safety-hooks/onnx"]
cedar = ["navra-auth/cedar"]

[dev-dependencies]
async-trait = { workspace = true }
axum = { workspace = true }
navra-protocol = { path = "../navra-protocol" }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["test-util", "macros"] }

[lints]
workspace = true
