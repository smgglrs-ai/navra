[package]
name = "navra-tools-file"
description = "File management module for navra"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[dependencies]
navra-core = { path = "../navra-core" }
navra-macros = { path = "../navra-macros" }
navra-protocol = { path = "../navra-protocol" }
navra-security = { path = "../navra-security" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
blake3 = { workspace = true }
rusqlite = { version = "0.32", features = ["bundled"] }
sqlite-vec = "0.1.6-alpha.2"
zerocopy = { version = "0.8", features = ["derive"] }
dirs = "6"
notify = "7"

[dev-dependencies]
tokio = { workspace = true, features = ["test-util", "macros"] }
tempfile = "3"
