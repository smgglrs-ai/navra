\* TLC model checking configuration for FlowConcurrency
\*
\* Run: tlc FlowConcurrency.tla -config FlowConcurrency.cfg
\*
\* Small model for quick verification (~10s):
\*   MaxParallel=2, NumTasks=4, NumSubflows=2
\*
\* Larger model for thorough checking (~5min):
\*   MaxParallel=4, NumTasks=8, NumSubflows=4

SPECIFICATION Spec

CONSTANTS
    MaxParallel = 2
    NumTasks = 4
    NumSubflows = 2

INVARIANTS
    TypeOK
    ConcurrencyBound
    PermitsNonNegative
    PermitConservation

\* Liveness properties disabled — the TLA+ model allows subflow
\* starvation that can't happen in the real code (poll_tasks_until_done
\* blocks until the batch completes before spawning subflows).
\* PROPERTIES
\*     AllTasksComplete
