# mcpd-docs default configuration
# Copy to ~/.config/mcpd-docs/config.toml and customize.

[server]
# socket = "$XDG_RUNTIME_DIR/mcpd/docs.sock"
tcp = "127.0.0.1:9315"  # development default

[index]
# db = "$XDG_DATA_HOME/mcpd-docs/index.db"
watch_debounce_ms = 500

[approval]
timeout_secs = 300
notify = "dbus"

# --- Agent definitions ---
# Generate tokens with: mcpd-docs token generate --name <name> --permissions <set>

# [[agents]]
# name = "claude-code"
# token_hash = "$blake3$..."
# permissions = "developer"

# --- Permission sets ---

[permissions.developer]
allow = ["~/Documents/**", "~/Notes/**"]
deny = ["**/.env", "**/*secret*", "**/credentials*"]
operations = ["read", "write", "search", "list", "index"]
approve = ["write"]

[permissions.readonly]
allow = ["~/Documents/shared/**"]
deny = []
operations = ["read", "search", "list"]
approve = []
