[package]
name = "smgglrs-security"
description = "Security primitives: auth, permissions, IFC, safety, hooks"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[dependencies]
smgglrs-protocol = { path = "../smgglrs-protocol" }
smgglrs-model = { path = "../smgglrs-model" }
anyhow = { workspace = true }
async-trait = { workspace = true }
axum = { workspace = true }
blake3 = { workspace = true }
bs58 = { workspace = true }
base64 = { workspace = true }
ciborium = { workspace = true }
ed25519-dalek = { workspace = true }
keyring = { workspace = true }
schemars = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
jsonwebtoken = { workspace = true }
glob = "0.3"
dirs = "6"
rand = "0.8"
regex-lite = "0.1"
ureq = { version = "3", features = ["json"] }
futures-util = "0.3"
ort = { version = "2.0.0-rc.12", default-features = false, features = ["ndarray", "std"] }
ndarray = "0.17"
tokenizers = { version = "0.22", default-features = false, features = ["onig"] }
zbus = { version = "5", default-features = false, features = ["tokio"] }
cedar-policy = { version = "4", optional = true }

[features]
cedar = ["dep:cedar-policy"]

[dev-dependencies]
tokio = { workspace = true, features = ["test-util", "macros"] }
tempfile = "3"
