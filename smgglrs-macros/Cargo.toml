[package]
name = "smgglrs-macros"
version = "0.1.0"
edition = "2021"

[lib]
proc-macro = true

[dependencies]
syn = { version = "2", features = ["full", "extra-traits"] }
quote = "1"
proc-macro2 = "1"

[dev-dependencies]
smgglrs-protocol = { path = "../smgglrs-protocol" }
smgglrs-security = { path = "../smgglrs-security" }
smgglrs-core = { path = "../smgglrs-core" }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt"] }
trybuild = "1"
