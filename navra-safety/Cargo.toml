[package]
name = "navra-safety"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
rust-version = "1.96"
description = "PII detection, content safety filters, and pseudonymization for Rust applications"
homepage.workspace = true
repository.workspace = true
keywords = ["pii", "safety", "content-filter", "ner", "privacy"]
categories = ["text-processing", "accessibility"]
readme = "README.md"

[features]
default = []
onnx = ["dep:dirs", "dep:ort", "dep:ndarray", "dep:tokenizers", "dep:navra-model"]

[dependencies]
regex-lite = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tracing = "0.1"

# ONNX-gated
navra-model = { path = "../navra-model", default-features = false, features = ["onnx"], optional = true }
dirs = { version = "6", optional = true }
ort = { version = "2.0.0-rc.12", default-features = false, features = ["ndarray", "std"], optional = true }
ndarray = { version = "0.17", optional = true }
tokenizers = { version = "0.22", default-features = false, features = ["fancy-regex"], optional = true }

[dev-dependencies]
tokio = { version = "1", features = ["test-util", "macros", "rt-multi-thread"] }
tempfile = "3"

[lints]
workspace = true
