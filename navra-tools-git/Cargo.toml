[package]
name = "navra-tools-git"
description = "Git module for navra"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[dependencies]
navra-core = { path = "../navra-core" }
navra-macros = { path = "../navra-macros" }
navra-protocol = { path = "../navra-protocol" }
navra-security = { path = "../navra-security" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
dirs = "6"
tracing = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["test-util", "macros"] }
tempfile = "3"
