# ---------------------------------------------------------------------------
# Credentials
# ---------------------------------------------------------------------------

# [credentials."github.pat"]
# source = "env"
# var = "GITHUB_TOKEN"

# ---------------------------------------------------------------------------
# Budget (resource limits for multi-agent flows)
# ---------------------------------------------------------------------------

[budget]
max_agents = 50
max_iterations = 200
max_parallel = 2
timeout_secs = 3600

# ---------------------------------------------------------------------------
# Approval (human-in-the-loop)
# ---------------------------------------------------------------------------

[approval]
timeout_secs = 300
notify = "dbus"

