kind: dag
name: comprehensive-review
description: |
  Full codebase review: scout → planner → specialist swarm → synthesizer.
  Covers architecture, code quality, security, testing, documentation,
  performance, and API design. Not security-focused — balanced review.

parameters:
  target_dir:
    type: string
    description: Root directory of the project to review

tasks:
  - id: scout
    specialist: principal_engineer
    model: gemma4:e4b
    mandate: |
      The project is at {{target_dir}}.
      Use file_tree with path="{{target_dir}}" and depth=2 to get
      the project structure. Use file_read to read
      {{target_dir}}/DESIGN.md and {{target_dir}}/CLAUDE.md.

      When done, publish your findings to the team blackboard:
        team_bb_publish(key="scout/report", value=<your full report>)

      Your report must contain:
      1. Complete file tree
      2. Architecture summary (crates, layering, key patterns)
      3. Project stats (file count, crate count)
    expected_output: File tree, architecture summary, project stats

  - id: planner
    specialist: analyst
    model: gemma4:26b
    generates_tasks: true
    mandate: |
      You are a project review planner. Create a balanced review plan
      covering ALL dimensions of project quality:

      1. ARCHITECTURE — dependency layering, module boundaries, API
         surface (are the right things public?)
      2. CODE QUALITY — error handling consistency, naming conventions,
         unnecessary complexity, dead code
      3. SECURITY — auth, permissions, IFC, safety filters, PII
      4. TESTING — coverage gaps, test quality, missing edge cases
      5. DOCUMENTATION — README accuracy vs code, stale references
      6. PERFORMANCE — mutex contention, unnecessary allocations,
         cloning patterns, hot paths
      7. USABILITY — config ergonomics, error messages, CLI UX

      Produce a JSON array of tasks. CRITICAL CONSTRAINTS:

      1. Each mandate MUST include these two instructions at the end:
         - "The project is at {{target_dir}}. Use file_read with absolute paths."
         - "When done, publish your findings: team_bb_publish(key=\"findings/<your_task_id>\", value=<your report>)"

      2. Each task: id, specialist, model ("auto"), mandate.

      3. The "specialist" field MUST be one of these EXACT strings:
         "principal_engineer", "software_developer", "security_sentinel",
         "tech_writer", "assessor". Do NOT invent specialist names.

      4. Scale: 5-10 tasks. One task per concern area.
         GOOD mandate: "Read navra-rag/src/ with file_read.
         Check chunking logic, vector store operations, and cache
         TTL handling. Report issues with file:line references.
         The project is at {{target_dir}}. Use file_read with absolute paths.
         When done, publish: team_bb_publish(key=\"findings/rag_review\", value=<report>)"

      5. The model field MUST be "auto" (not a URI or model name).

      Output ONLY the JSON array.
    depends_on: [scout]
    expected_output: JSON array of 5-10 tasks covering all dimensions

  - id: synthesize
    specialist: summarizer
    model: gemma4:26b
    mandate: |
      You are a report synthesizer. Specialist agents have published
      their findings to the team blackboard under keys starting with
      "findings/".

      Step 1: Use team_bb_notifications to see what keys are available.
      Then use team_bb_read to read each findings/* entry.

      Step 2: Write a comprehensive report covering:

      ## Executive Summary
      3-5 sentences summarizing the overall findings.

      Then for each specialist area, create a section with the actual
      findings. Derive the structure from what the specialists reported.
      Include severity levels and file:line references where provided.

      ## Action Items
      Top 10 most important items, prioritized by severity.

      Step 3: Publish the final report:
        team_bb_publish(key="report/final", value=<your full report>)

      Be thorough. Read EVERY findings/* entry before writing.
    depends_on: [planner]
    expected_output: Comprehensive report synthesized from all specialist findings
