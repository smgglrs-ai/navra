kind: dag
name: security-audit
description: |
  Multi-stage security audit with progressive exploration.
  Stage 1: Scout explores project structure (fast model).
  Stage 2: Planner designs targeted review tasks from the summary.
  Stage 3: Specialists review code in parallel (one per concern).
  Stage 4: Synthesizer merges findings into a prioritized report.

parameters:
  target_dir:
    type: string
    description: Root directory of the project to audit
  depth:
    type: string
    description: Exploration depth for scout (default 2)
    default: "2"

tasks:
  - id: scout
    specialist: security_sentinel
    model: granite3.3:8b
    mandate: |
      Explore the project at {{ target_dir }} using docs_tree.
      Return a structured list of ALL source files with their
      exact relative paths as shown by docs_tree. Group them by
      security relevance:

      1. HIGH RISK: auth, secrets, config, API handlers, crypto
      2. MEDIUM RISK: data processing, middleware, validation
      3. LOW RISK: tests, docs, utilities

      Include the exact path for each file (e.g. "src/handler.rs").
      The planner will use these paths verbatim — do not abbreviate.
    expected_output: Categorized file list with exact relative paths
    success_criteria:
      - Lists ALL source files with exact paths from docs_tree
      - Categorizes by security risk level

  - id: planner
    specialist: analyst
    model: gemma4:26b
    mandate: |
      Design a targeted security review plan using ONLY the file
      paths listed in the scout output above. Do NOT invent paths.

      For each review task specify:
      - Task ID (short, descriptive)
      - Exact file paths to review (copy from the scout output)
      - What to look for (specific vulnerability classes)
      - Persona to assign
      - Model to use (granite3.3:8b for file reading, gemma4:26b
        for cross-file reasoning like auth flow tracing)

      Group files that should be reviewed together (e.g. API
      handler + its auth middleware). Keep to 3-4 tasks max.
    depends_on: [scout]
    expected_output: Structured review plan with exact file paths from scout
    success_criteria:
      - Every file path exists in the scout output
      - Each task specifies vulnerability focus

  - id: credential_scan
    specialist: security_sentinel
    model: granite3.3:8b
    mandate: |
      Read EACH file listed in the planner's credential/secrets task
      using docs_read with the exact paths from the plan. For each
      file, search for: hardcoded credentials, API keys, connection
      strings, encryption keys, tokens.

      You MUST call docs_read for every file. Do not guess what files
      contain — read them. Report exact file paths, line numbers, and
      the actual code snippet containing the issue.
    depends_on: [planner]
    expected_output: List of credential exposure findings with file paths and line numbers

  - id: code_review
    specialist: security_sentinel
    model: gemma4:26b
    mandate: |
      Read EACH source file listed in the planner's code review
      task using docs_read with the exact paths from the plan.
      For each file, look for: SQL injection, command injection,
      XSS, IDOR, missing auth, broken access control.

      You MUST call docs_read for every file. Trace data flow from
      input to sensitive operations. Report specific file paths,
      line numbers, CWE codes, and the actual vulnerable code.

      If the planner identified more than 5 files, call flow_escalate
      to spawn a sub-team for parallel review.
    depends_on: [planner]
    expected_output: List of code-level vulnerabilities with CWEs, line numbers, and evidence

  - id: synthesize
    specialist: synthesizer
    model: gemma4:26b
    mandate: |
      Combine all findings from the credential scan and code review
      into a professional security audit report. Structure it as:
      1. Executive summary (2-3 sentences)
      2. Critical findings (with remediation steps)
      3. High findings
      4. Medium/Low findings
      5. Remediation roadmap (prioritized table)
      Include confidence scores per finding.

      IMPORTANT: Only include findings that cite actual code from
      docs_read output. Discard any finding that references a file
      path not present in the scout's file list — those are
      hallucinated. Mark findings with code evidence as HIGH
      confidence and those without as LOW.
    depends_on: [credential_scan, code_review]
    expected_output: Professional security audit report with only verified findings
