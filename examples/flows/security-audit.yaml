kind: dag
name: security-audit
description: |
  Security audit via scout → planner → specialist swarm → synthesizer.
  The planner decides the decomposition based on project size and risk.

parameters:
  target_dir:
    type: string
    description: Root directory of the project to audit

tasks:
  - id: scout
    specialist: security_sentinel
    model: granite3.3:8b
    mandate: |
      Use file_tree to list all files in the project. Return the
      complete file list with exact relative paths.
    expected_output: Complete file list with paths

  - id: planner
    specialist: analyst
    model: qwen3.6:35b-a3b
    generates_tasks: true
    mandate: |
      You are a security audit planner. Given the project file list
      from the scout, create a thorough review plan.

      Produce a JSON array of tasks. Each task should:
      - Have a clear id, specialist ("security_sentinel"), and mandate
      - Cover ALL security-relevant files, not just a sample
      - Tell the specialist which files to read with file_read
      - Specify what to look for

      Use models_list and personas_list to pick appropriate models
      and personas for each task.

      Scale the number of tasks to the project — a 4-file project
      needs 2 tasks, a 100-file project needs 10-20 tasks. Every
      security-relevant file must be assigned to at least one task.

      Output ONLY the JSON array.
    depends_on: [scout]
    expected_output: JSON array of tasks covering all files

  - id: synthesize
    specialist: synthesizer
    model: gemma4:26b
    mandate: |
      Merge all specialist findings into a security audit report.
      Only include findings backed by actual code from file_read.
      Discard any claim without a file path and line number.
    depends_on: [planner]
    expected_output: Security audit report with verified findings
