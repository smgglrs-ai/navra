# navra config section for Goose integration
# Merge into ~/.config/navra/config.toml
#
# Generate a token:
#   navra token generate --name goose --permissions developer
#
# The command prints a bearer token (give to Goose) and a BLAKE3
# hash (paste below as token_hash).

[[agents]]
name = "goose"
token_hash = "<blake3-hash-from-navra-token-generate>"
permissions = "developer"

[permissions.developer]
allow = ["~/Code/**", "~/Documents/**"]
deny = ["**/.env", "**/*.key", "**/*secret*", "**/credentials*"]
operations = [
    "read", "write", "search", "list",
    "git.status", "git.diff", "git.log", "git.branch",
]
approve = ["git.commit", "git.push"]
safety = "standard"
default_tool_policy = "allow"

[[permissions.developer.tool_rules]]
tool = "git_push"
policy = "deny"

[[permissions.developer.tool_rules]]
tool = "git_commit"
policy = "approve"
