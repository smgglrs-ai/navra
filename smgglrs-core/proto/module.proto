syntax = "proto3";
package smgglrs.module.v1;

service ModuleService {
    // Discovery: return all tools, prompts, resources.
    rpc GetCapabilities(GetCapabilitiesRequest)
        returns (GetCapabilitiesResponse);

    // Execute a tool call.
    rpc CallTool(CallToolRequest)
        returns (CallToolResponse);

    // Render a prompt template.
    rpc GetPrompt(GetPromptRequest)
        returns (GetPromptResponse);

    // Read a resource.
    rpc ReadResource(ReadResourceRequest)
        returns (ReadResourceResponse);

    // Health check.
    rpc Health(HealthRequest) returns (HealthResponse);
}

message GetCapabilitiesRequest {}

message GetCapabilitiesResponse {
    repeated ToolDef tools = 1;
    repeated PromptDef prompts = 2;
    repeated ResourceDef resources = 3;
}

message ToolDef {
    string name = 1;
    string description = 2;
    // JSON Schema serialized as JSON bytes.
    bytes input_schema_json = 3;
}

message PromptDef {
    string name = 1;
    string description = 2;
    repeated PromptArgDef arguments = 3;
}

message PromptArgDef {
    string name = 1;
    string description = 2;
    bool required = 3;
}

message ResourceDef {
    string uri = 1;
    string name = 2;
    string description = 3;
    string mime_type = 4;
}

message CallToolRequest {
    string name = 1;
    // serde_json::Value serialized as JSON bytes.
    bytes arguments_json = 2;
    ToolCallContext context = 3;
}

message ToolCallContext {
    string agent_name = 1;
    string session_id = 2;
    string data_label = 3;
    uint32 ring = 4;
}

message CallToolResponse {
    repeated ContentItem content = 1;
    bool is_error = 2;
    // Data label of the result (may differ from request if tool taints).
    string result_data_label = 3;
}

message ContentItem {
    // "text", "image", "resource"
    string type = 1;
    string text = 2;
    string mime_type = 3;
    bytes data = 4;
}

message GetPromptRequest {
    string name = 1;
    map<string, string> arguments = 2;
}

message GetPromptResponse {
    string description = 1;
    repeated PromptMessage messages = 2;
}

message PromptMessage {
    string role = 1;
    string content = 2;
}

message ReadResourceRequest {
    string uri = 1;
}

message ReadResourceResponse {
    repeated ResourceContentItem contents = 1;
}

message ResourceContentItem {
    string uri = 1;
    string mime_type = 2;
    string text = 3;
    bytes blob = 4;
}

message HealthRequest {}

message HealthResponse {
    bool healthy = 1;
    string message = 2;
}
