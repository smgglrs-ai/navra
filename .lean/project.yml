name: navra
version: "0.3.0"
description: Secure MCP gateway daemon for Linux desktops
repository: git@github.com:smgglrs-ai/navra.git
type: monorepo
license: Apache-2.0
item_prefix: NAVRA
next_item_id: 176

stack:
  language: rust
  edition: "2024"
  msrv: "1.96"
  build_system: cargo
  workspace_members: 22
  test_framework: cargo-test
  lint: clippy
  formatter: rustfmt
  ci: github-actions

autonomy:
  # Tier 1: read anything, write with constraints
  read: unrestricted
  write: source-code-with-plan
  execute: build-test-lint
  git: commit-with-signoff

  # Tier 2: what requires confirmation
  confirm_before:
    - git push
    - git reset
    - git rebase
    - destructive file operations
    - modifying CI/CD

  # Tier 3: never do autonomously
  never:
    - git push --force
    - rm -rf
    - modify .env or credentials
    - skip pre-commit hooks

verification:
  quick: "just test-workspace"
  full: "cargo fmt -- --check && cargo clippy -- -D warnings && just test"
  single_crate: "just test-crate {crate}"
  build: "cargo build"
  e2e: "just test-server"

loop:
  max_iterations: 20
  scope: autonomous
  sandbox: openshell
  git:
    branch_prefix: loop
    tag_runs: true
    push_after_each: false
    commit_style: conventional
