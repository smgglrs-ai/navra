id: NAVRA-049
title: PII ONNX classifier
status: done
priority: low
effort: M
depends_on: []
feeds: []
description: |
  Add PiiClassifier to navra-safety using ONNX sequence classification as a fast pre-filter. Follows NerFilter/PrivacyFilterModel pattern. Short-circuits expensive NER when classifier scores text below PII threshold. Configurable threshold, graceful degradation.
acceptance:
  - "PiiClassifier loads ONNX model, implements ContentFilter, returns Finding on PII detection"
  - "FilterPipeline short-circuits NER/privacy-filter when classifier says no PII"
  - "Graceful degradation when model files missing"
  - "Unit tests cover loading, softmax, short-circuit logic, category mapping"
  - "Server integration via pii_classifier_model config field"
scope:
  - navra-safety/src/pii_classifier.rs
  - navra-safety/src/lib.rs
  - navra-server/src/main.rs
  - navra-server/src/config/
verification:
  quick: "ORT_LIB_PATH=/usr/lib64 ORT_PREFER_DYNAMIC_LINK=1 cargo test -p navra-safety pii_classifier"
