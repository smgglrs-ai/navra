id: NAVRA-069
title: Multi-hypothesis tool routing
status: done
priority: low
effort: M
depends_on: []
feeds: []
description: |
  Add multi-hypothesis tool routing to handle_call_tool. When exact name misses (handlers.rs:704), score registered tools on edit distance, argument schema overlap, and optional description similarity. Auto-route above threshold, suggest below. Configurable via [server.tool_routing].
acceptance:
  - "Unknown tool within edit-distance 2 auto-routes to closest match with _routed_from metadata"
  - "Below auto-route threshold, error includes ranked suggestions (up to 5)"
  - "Config: auto_route_threshold, suggestion_threshold, enabled (default false)"
  - "Scoring uses edit distance + argument Jaccard + optional embedding similarity"
  - "Auto-routing logged at info level for audit"
  - "Tests cover exact match passthrough, misspelling auto-route, distant name suggestions, disabled config"
scope:
  - navra-core/src/server/handlers.rs
  - navra-core/src/server/mod.rs
  - navra-core/src/server/builder.rs
  - navra-core/src/server/routing.rs
  - navra-protocol/src/mcp.rs
verification:
  quick: "ORT_LIB_PATH=/usr/lib64 ORT_PREFER_DYNAMIC_LINK=1 cargo test -p navra-core -- routing"
