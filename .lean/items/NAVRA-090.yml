id: NAVRA-090
title: "Replace navra-tools-git with upstream Git MCP server"
status: planned
priority: medium
effort: 3-5d
depends_on: []
feeds: []
description: |
  Remove navra-tools-git and use Anthropic's mcp-server-git as the
  upstream Git MCP server. Fork the reference implementation, add
  delegated signing key support, and use the fork immediately. Submit
  upstream PR in parallel — not blocked on acceptance.

  Follows the "prefer existing MCPs" decision. Contributing to the
  official reference server benefits the ecosystem and positions navra
  as the gateway that enables agent-level provenance.

  Phase 1 — Fork and extend (not blocked):
  1. Fork modelcontextprotocol/servers (or just mcp-server-git)
     to smgglrs-ai/mcp-server-git
  2. Add signing key parameter to git_commit: agent passes a derived
     Ed25519 key, server uses it for commit signing. Adds Signed-off-by
     with agent identity from capability chain
  3. Publish fork to PyPI as smgglrs-mcp-server-git (or use direct
     path install)
  4. Configure as upstream in navra, verify tool_rules replicate
     per-operation permissions
  5. Remove navra-tools-git crate

  Phase 2 — Upstream contribution (parallel, non-blocking):
  6. Submit PR to modelcontextprotocol/servers with signing key support
  7. When merged, switch from fork to official package
  8. Archive/delete fork

  navra-tools-git: 8 tools, 52 tests. No external type dependencies.
acceptance:
  - "Fork with signing key support published and functional"
  - "navra configured to use fork as upstream"
  - "Agent commit signing works via delegated key"
  - "Per-operation approval enforced at gateway (tool_rules)"
  - "navra-tools-git crate removed"
  - "Upstream PR submitted"
notes: |
  - Anthropic's mcp-server-git: Python, 8 tools, MIT, maintained by
    MCP steering group. Official reference implementation.
  - Signing key contribution: agent passes Ed25519 key via tool argument
    or MCP context. Server configures git with the key for that commit.
  - Fork lives at smgglrs-ai/mcp-server-git until upstream merges.
