id: NAVRA-091
title: "Replace navra-tools-file with upstream Filesystem MCP server"
status: planned
priority: medium
effort: 2-3d
depends_on: []
feeds: []
description: |
  Remove navra-tools-file and use Anthropic's server-filesystem as the
  upstream. Fork if needed for missing features, submit upstream PR in
  parallel — not blocked on acceptance.

  Follows the "prefer existing MCPs" decision.

  Phase 1 — Evaluate and configure (may not need fork):
  1. Test @modelcontextprotocol/server-filesystem with navra as gateway
  2. Verify tool_rules replicate per-operation permissions:
     - write tools → policy: approve
     - read tools → policy: allow
  3. Evaluate search gap: upstream has no FTS5. navra-rag already
     provides hybrid FTS5+vector search — confirm it covers the use
     case without file module's built-in search
  4. Verify gateway-level approval gates replace file_approve/file_deny

  Phase 2 — Fork if needed:
  5. If upstream lacks critical features (e.g., file_edit with diff
     semantics), fork to smgglrs-ai/mcp-server-filesystem, add them,
     submit upstream PR

  Phase 3 — Remove module:
  6. Remove navra-tools-file from workspace
  7. Update docs, test counts

  navra-tools-file: 65 tests (54 unit + 11 integration). Most tests
  in the workspace — careful validation.
acceptance:
  - "Upstream filesystem server configured and functional via navra"
  - "Per-operation approval enforced at gateway level"
  - "File search available via navra-rag (or upstream if supported)"
  - "navra-tools-file crate removed"
  - "All workspace tests pass"
notes: |
  - @modelcontextprotocol/server-filesystem: Node.js, Anthropic
    reference, configurable allowed directories. MIT.
  - FTS5 search gap: navra-rag provides hybrid search. If operators
    need file indexing, they configure navra-rag — the file module's
    built-in search is redundant.
  - HitL flow: file_approve/file_deny are navra-specific. The gateway
    tool_rules policy: approve provides equivalent UX via the standard
    approval gate hook.
