id: NAVRA-061
title: Memory type classification
status: done
priority: low
effort: S
depends_on: []
feeds: []
description: |
  Add ONNX-based 4-label memory type classifier to distillation pipeline. New with_classifier() on DistillationPipeline, classify entries in synthesize_stub() instead of defaulting to Fact. Also expose classify via KnowledgeModule MCP tool with memory_type=auto.
acceptance:
  - "ONNX classifier loadable via config, injected via with_classifier()"
  - "synthesize_stub() uses classifier when available for MemoryType and confidence"
  - "Without classifier, behavior unchanged (graceful degradation)"
  - "KnowledgeModule accepts memory_type=auto for classification on write"
  - "Unit tests cover classifier-present and classifier-absent paths"
  - "Integration test verifies end-to-end stub synthesis with classifier"
scope:
  - navra-memory/src/pipeline.rs
  - navra-memory/src/tools.rs
  - navra-memory/src/types.rs
verification:
  quick: "cargo test -p navra-memory"
