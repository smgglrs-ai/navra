id: NAVRA-026
title: AG-UI React dashboard with PatternFly
status: planned
priority: medium
effort: M
depends_on:
- NAVRA-004
feeds: []
description: |
  Add AG-UI protocol support to navra's React frontend using navra-react
  PatternFly components. This creates a NavraAgentAdapter that connects
  to navra's existing streaming endpoints and translates events into
  AG-UI protocol events, plus React components that consume them.

  navra already emits:
  - NDJSON via /api/chat/agent: text, tool_call, tool_result, thinking, done, error
  - WebSocket via /ws/ui: process_update, tool_call_end

  The adapter translates these into AG-UI events:
  - text → TEXT_MESSAGE_CONTENT
  - tool_call → TOOL_CALL_START + TOOL_CALL_ARGS
  - tool_result → TOOL_CALL_END
  - thinking → REASONING_MESSAGE_CONTENT
  - done → RUN_FINISHED
  - error → RUN_ERROR

  React components (using navra-react PatternFly library):
  - AgentChatPanel: streaming text with markdown, tool call cards
  - useNavraAgent hook: connects adapter, manages AG-UI state
  - Integration with existing AgentActivity and ApprovalQueue components

  This is separate from rendra-ag-ui (vanilla Web Component for embedding).
  See NEXT_STEPS.md in that repo for its own roadmap.
acceptance:
  - "NavraAgentAdapter connects to /api/chat/agent NDJSON and /ws/ui WebSocket"
  - "Adapter maps all 6 navra event types to corresponding AG-UI events"
  - "useNavraAgent React hook manages connection lifecycle and AG-UI state"
  - "AgentChatPanel renders streaming text, tool calls, and reasoning with PatternFly components"
  - "Authentication token passed via hook configuration"
  - "Unit tests cover adapter event translation for each navra event type"
scope:
  - navra-react/packages/react/src/
  - navra-ui/src/
verification:
  quick: "cd navra-react && pnpm test"
notes:
  - date: "2026-06-19"
    detail: |
      Revised from Web Component approach to React+PatternFly. The vanilla
      rendra-ag-ui widget continues separately for Rendra desktop embedding.
      navra-react already has AgentActivity, ApprovalQueue, FlowVisualizer
      PatternFly components that can be composed with the new AG-UI adapter.
