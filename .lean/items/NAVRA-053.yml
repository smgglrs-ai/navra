description: 'Resolve the open restructuring decisions across the five paper drafts in docs/papers/. The review notes (2026-05-07)
  flag concrete questions: whether to fold the persona paper (persona-orchestration.md) into the flagship security paper or
  keep it standalone; whether to drop contributions 3-4 from the review paper (autonomous-review.md); whether the audit-blackbox
  and model-cards papers stand alone or become sections of the flagship. This item produces a written decision record in docs/papers/
  documenting the final paper structure, venue targets, and dependency ordering, so that NAVRA-019 (persona paper) and NAVRA-020
  (review paper) can proceed with clear scope.'
acceptance:
