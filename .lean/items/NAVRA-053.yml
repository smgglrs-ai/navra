  autonomous-review, audit-blackbox, model-cards)
- 'Each paper has a verdict: standalone, fold into flagship, or drop -- with rationale'
- Venue targets and submission ordering are specified for each paper that survives
- The persona paper fold-or-standalone question is resolved with explicit scope boundaries
- The review paper contribution list is finalized (which contributions to keep, which to drop)
- NAVRA-019 and NAVRA-020 item descriptions can be updated based on the decisions made
