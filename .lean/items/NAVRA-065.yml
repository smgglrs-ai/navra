id: NAVRA-065
title: Config schema generation
status: backlog
priority: low
effort: S
depends_on: []
feeds: []
description: 'The `navra schema` CLI subcommand already exists and generates a JSON Schema from schemars derives, but the
  output is incomplete: 58 out of ~120 config fields lack descriptions (schemars uses Rust doc comments as schema descriptions,
  and most struct fields have none). The work is to add doc comments to all config struct fields across 8 config source files
  so the generated schema is self-documenting, commit a reference schema file for editor/IDE validation (e.g., `config.schema.json`),
  and add a regression test ensuring the schema stays valid and doesn''t silently lose definitions.'
acceptance:
- All config struct fields in navra-server/src/config/*.rs have Rust doc comments that appear as descriptions in the generated
  JSON Schema (zero undescribed fields)
- A committed config.schema.json file is generated by `navra schema` and kept in the repo root or examples/ directory
- A unit or integration test verifies that `schemars::schema_for!(Config)` produces valid JSON Schema with all expected top-level
  property keys present
- The examples/config.toml includes a comment referencing the schema file for editor integration (TOML language server / taplo
  $schema)
- The `navra schema` subcommand writes to stdout by default and accepts an optional --output flag to write directly to a file
scope:
- navra-server/src/config/mod.rs
- navra-server/src/config/server.rs
- navra-server/src/config/modules.rs
- navra-server/src/config/agents.rs
- navra-server/src/config/permissions.rs
- navra-server/src/config/models.rs
- navra-server/src/config/security.rs
- navra-server/src/config/tests.rs
- navra-server/src/cli.rs
- navra-server/src/main.rs
- navra-core/src/hooks/routing.rs (RoutingConfig description)
- navra-core/src/credentials.rs (CredentialMapping description)
- examples/config.toml
- config.schema.json (new, committed artifact)
verification:
  quick: ORT_LIB_PATH=/usr/lib64 ORT_PREFER_DYNAMIC_LINK=1 cargo test -p navra-server -- config::tests
