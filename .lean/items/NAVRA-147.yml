id: NAVRA-147
title: MCP Enterprise-Managed Authorization (ID-JAG)
status: done
priority: medium
effort: M
depends_on: []
feeds: []
source: tech-watch-2026-06-19
scope:
  - navra-auth/src/auth/
  - navra-core/src/transport/
  - navra-protocol/src/
description: |
  Support the MCP Enterprise-Managed Authorization extension
  (io.modelcontextprotocol/enterprise-managed-authorization) for
  centralized IdP-controlled access to navra.

  The extension defines an ID-JAG (Identity Assertion JWT Authorization
  Grant) flow where:
  1. Client authenticates to corporate IdP (Okta, Azure AD, etc.)
  2. IdP issues ID Token
  3. Client exchanges ID Token for ID-JAG from IdP
  4. Client exchanges ID-JAG for MCP access token from navra

  Implementation:
  - Declare extension support in initialize response capabilities
  - Validate ID-JAG JWTs against IdP JWKS endpoint
  - Map IdP claims (scope, resource) to navra permission sets
  - Support centralized revocation via IdP
  - Add enterprise_auth config section to config.toml

  navra already has OAuth + capability tokens. This extends the auth
  layer with the enterprise delegation pattern from the MCP spec.
acceptance:
  - "navra declares enterprise-managed-authorization in capabilities"
  - "ID-JAG JWTs validated against configurable JWKS endpoint"
  - "IdP claims mapped to navra permission sets via config"
  - "Enterprise auth flow works end-to-end with mock IdP in tests"
verification:
  quick: "cargo test -p navra-auth -p navra-core"
notes:
  - date: "2026-06-19"
    detail: |
      Source: https://modelcontextprotocol.io/extensions/auth/enterprise-managed-authorization
      SEP-990 proposal. Draft spec in ext-auth repo.
  - date: "2026-07-01"
    detail: |
      Tech watch deep research (verified 3-0) found strong industry
      validation of the actor-chain delegation pattern:

      1. Uber production (thousands of agents): SPIRE SVIDs as trust
         anchor, STS issuing single-hop JWTs (P99 <40ms), act_chain
         JWT claims with ordered {sub, agent_id, iat} entries.
         Source: uber.com/us/en/blog/solving-the-agent-identity-crisis/

      2. AIMS draft (draft-klrc-aiagent-auth-02, June 2026): Authors
         from OpenAI, Auth0, AWS, Zscaler, Ping Identity. Mandates
         WIMSE identifiers + RFC 8693 Token Exchange for delegation.
         Source: datatracker.ietf.org/doc/draft-klrc-aiagent-auth/

      3. CRITICAL: Both IETF drafts have ZERO mention of DIDs.
         Standards track is WIMSE/SPIFFE, not W3C DIDs.
         See NAVRA-172 for dual-identity support.

      4. Actor chains complement IFC: chains track WHO delegated,
         IFC tracks WHAT data flowed. See NAVRA-175.
