id: NAVRA-062
title: NemoClaw MCP bridge
status: wont_do
priority: low
effort: M
depends_on: []
feeds: []
closed: 2026-06-24
closed_reason: |
  navra already integrates with OpenShell directly via gRPC
  (navra-model-runtime/src/openshell.rs) for sandbox isolation —
  the same backend NemoClaw uses. NemoClaw is OpenClaw + OpenShell +
  YAML policies + TypeScript CLI glue. navra replaces every layer
  except OpenShell itself with stronger alternatives: IFC taint
  tracking vs YAML allow/deny, ML safety classifiers vs regex-only
  filtering, Rust agent SDK vs no SDK, deny-wins ACLs vs flat policy
  files.

  Bridging to NemoClaw would mean routing through two policy engines
  with overlapping concerns and no clear trust boundary — navra would
  enforce IFC on tool calls that NemoClaw already policy-gated, adding
  latency without security value.

  The one useful feature (tool namespace prefixing for upstream servers)
  should be a generic [[upstream]] option, not a NemoClaw-specific
  transport. Generic upstream prefixing can be tracked as a separate
  item if needed.
description: Add a NemoClaw-aware upstream profile so navra can connect to a running NemoClaw (NVIDIA's OpenClaw + OpenShell
  gateway) instance as an MCP upstream, applying navra's own security stack on top. NemoClaw exposes standard MCP over HTTP/SSE,
  so the transport works today via generic `[[upstream]]`, but a dedicated bridge adds tool namespace prefixing (to avoid
  collisions with navra's own tools), NemoClaw API key auth header injection, and optional YAML policy import so NemoClaw's
  declared policies can seed navra permission rules. This enables hybrid deployments where NemoClaw handles sandbox lifecycle
  and navra enforces IFC, deny-wins ACLs, and ML safety on top.
