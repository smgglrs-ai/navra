id: NAVRA-086
title: "Agent skills for navra adoption (init, policy, flow, diagnose)"
status: done
priority: high
effort: 3-5d
depends_on: []
description: |
  Build Claude Code skills that make navra configuration and operation
  AI-assisted. These reduce the adoption barrier from "read docs and
  write TOML" to "tell the agent what you want."

  Wave 1 — first-contact adoption skills (this item):

  1. **navra-init** (1-2d): Detects agent setup (Claude Code, Goose,
     custom), generates config.toml with appropriate permission sets,
     creates BLAKE3 tokens, writes systemd unit file, starts service.
     Interactive: asks what agents will connect, what directories to
     expose, what safety level to apply.

  2. **navra-diagnose** (1d): "Why was this tool call blocked?" →
     reads navra logs/audit trail, identifies the denial reason
     (ACL rule, IFC violation, safety hook, approval timeout),
     and suggests the minimal config change to allow it if
     appropriate. The audit2allow for navra.

  3. **navra-policy** (1d): Natural language to ACL rules. "My agent
     should read code but not .env files" → generates deny/allow rules
     with proper glob patterns. Can also audit an existing config and
     suggest tightening (audit2allow inverse — suggest2deny).

  Wave 2 — advanced use cases (separate item, deferred):

  4. navra-flow-builder: flow YAML from natural language
  5. navra-agent-scaffold: Dockerfile + persona + permissions

  Wave 1 skills serve double duty: they ARE the developer experience,
  and they're also the integration test for navra's programmatic API
  surface. If a skill can't configure navra, the API needs work.
acceptance:
  - "navra-init skill generates valid config.toml for Claude Code setup"
  - "navra-diagnose reads audit log and explains denial chain"
  - "navra-policy skill converts natural language to correct ACL rules"
  - "All skills work as Claude Code skills (invokable via /skill-name)"
scope:
  - skills/navra-init/
  - skills/navra-diagnose/
  - skills/navra-policy/
notes: |
  - Skills also validate navra's public API surface — if a skill can't
    programmatically configure navra, the config format needs improvement.
  - syllogis/navra/ directory (config.toml + personas + heuristics + flows)
    is the reference integration pattern for flow-builder and agent-scaffold.
  - Consider making skills also work as MCP tools (navra exposes them) so
    any agent (not just Claude Code) can self-configure navra.
