id: NAVRA-089
title: "React dashboard scaffolding (@navra/react-hooks)"
status: planned
priority: medium
effort: 2-3d
depends_on: []
description: |
  Scaffold the React monorepo and build the hooks package that all
  dashboard components depend on.

  Steps:
  1. Create navra-react/ directory with monorepo structure:
     - packages/react-hooks/ (@navra/react-hooks)
     - packages/react/ (@navra/react) — empty, components added later
  2. Set up TypeScript, PatternFly React, build tooling (tsup or vite)
  3. Set up Storybook for component development
  4. Implement useNavraMetrics() — fetches and parses Prometheus /metrics
  5. Implement useNavraSSE() — subscribes to navra SSE notification stream
  6. Implement useApprovalQueue() — manages pending approval state via SSE

  The hooks package is more valuable than the components — it lets
  people build custom dashboards with navra data without being locked
  into PatternFly's look.
acceptance:
  - "navra-react/ monorepo builds with TypeScript"
  - "Storybook runs"
  - "useNavraMetrics() fetches and parses Prometheus metrics"
  - "useNavraSSE() connects to SSE and receives events"
  - "PatternFly React dependency configured"
scope:
  - navra-react/
notes: |
  - PatternFly React: Red Hat ecosystem, mature, accessible.
  - Storybook for development and documentation.
  - Components (NAVRA-094 through NAVRA-098) depend on this scaffolding.
