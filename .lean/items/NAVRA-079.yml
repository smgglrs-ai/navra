id: "NAVRA-079"
title: "Map ADR-Bench attack taxonomy to navra defense layers"
status: planned
priority: medium
effort: 1d
depends_on: []
feeds: ["NAVRA-048"]
source: tech-watch-2026-06-13
description: |
  Documentation exercise: map Uber's ADR-Bench 17 attack techniques
  against navra's defense layers. No code, no benchmark runs.

  Steps:
  1. Read the ADR paper (arxiv 2605.17380) attack taxonomy section
  2. For each of the 17 techniques, identify which navra layer
     handles it: IFC, ACLs, safety hooks, tool scanner, egress
     filter, sandbox, or unaddressed
  3. Compare ADR's regex prevention layer (97.2% precision) with
     navra's pattern-based safety hooks architecturally
  4. Document in docs/evaluations/adr-bench-mapping.md

  This is the prerequisite for a live benchmark run (NAVRA-093).
acceptance:
  - "17 attack techniques mapped to navra defense layers"
  - "Gap analysis identifying unaddressed techniques"
  - "Documented in docs/evaluations/"
