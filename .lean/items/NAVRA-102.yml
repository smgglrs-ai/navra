id: "NAVRA-102"
title: "IFC enforcement in stateless MCP transport"
status: done
progress: 100
priority: medium
effort: S
depends_on: ['NAVRA-101']
feeds: ['NAVRA-018']
description: |
  Enable IFC enforcement over the 2026-07-28 stateless transport.

  Investigation revealed that stateless dispatch already maintains
  server-side sessions keyed by "stateless:{agent_name}". Taint
  persists via those sessions — no opaque client token needed.

  Two fixes applied:
  1. Reset stateless session on initialize — prevents stale taint
     from a previous server run or conversation from leaking into
     new conversations. Without this, persistent session storage
     (SQLite) preserved taint across server restarts.
  2. Relaxed NAVRA-101 startup guard from bail to warning — stateless
     mode works for IFC, but all anonymous clients share taint state
     (fail-closed, not a security issue, but over-blocks in
     multi-client setups).

  The opaque client token design (AES-GCM encrypted session handle)
  remains a future option for per-client taint isolation in
  multi-client stateless deployments.

  Known limitation: all clients sharing the same agent identity
  share taint state. If one reads a secret, all are blocked from
  writing. This is safe but may over-block.
acceptance:
  - "IFC enforcement works over 2026-07-28 stateless transport"
  - "Taint persists across tool calls via server-side sessions"
  - "e2e benchmark passes in stateless mode (F1=1.000)"
  - "NAVRA-101 startup check relaxed to warning"
  - "Initialize resets taint for new conversations"
notes: |
  Original design called for opaque AES-GCM client tokens. Not needed
  because stateless dispatch already has server-side sessions. The
  agent name can't be forged (server-assigned from verified creds or
  hardcoded "anonymous" for NoAuthenticator).
