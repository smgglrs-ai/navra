description: |
  Evaluate Microsoft ASSERT (spec-driven evaluation framework) as complement to Glasswing for C3. ASSERT converts natural-language policies into test suites with LLM-as-judge scoring grounded in OTel traces. Supports 100+ model endpoints via LiteLLM, 33+ frameworks via OpenInference. Could provide structured, reproducible evaluation alongside Glasswing's adversarial testing. MIT license.
