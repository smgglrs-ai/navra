id: "NAVRA-043"
title: "JSON response compression hook"
status: planned
priority: medium
effort: 1-2d
depends_on: []
feeds: []
source: tech-watch-2026-06-02
description: |
  Post-hook that compresses large JSON tool responses before they
  reach the agent's context window. No ML model required — pure
  structural compression.

  Strategies (configurable per permission set):
  1. Key filtering: remove verbose metadata keys (timestamps, IDs,
     pagination cursors) that agents rarely need
  2. Array truncation: keep first N elements + count of remaining
     (already exists in navra-openapi handler — generalize to a hook)
  3. Nested flattening: collapse deep JSON trees to 2-level summaries

  Implement as a post-hook in navra-safety-hooks. The BudgetHook
  already handles token-level truncation — this hook operates on
  JSON structure before token counting.

  Config:
  ```toml
  [hooks.json_compress]
  max_array_elements = 20
  max_depth = 3
  strip_keys = ["_links", "pagination", "metadata"]
  ```
acceptance:
  - "Large JSON arrays truncated to configured limit with count annotation"
  - "Configurable key stripping works"
  - "Hook integrates with existing HookPipeline"
  - "Tests with realistic API response payloads"
