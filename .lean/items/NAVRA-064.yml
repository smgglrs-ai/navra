id: NAVRA-064
title: Nomic Embed v1.5 evaluation
status: done
priority: medium
effort: M
depends_on: []
feeds: []
description: |
  Evaluate Nomic Embed v1.5 as an alternative embedding model for navra-rag vector search, comparing against granite-embedding-r2 (768-dim, ONNX). Add registry entry, verify ONNX compatibility via OnnxBackend, write retrieval quality benchmark (recall@k + latency), and test Matryoshka dimension support (64-768). The standalone navra-rag server already accepts --embedding-model and --dimensions flags for A/B testing.
acceptance:
  - "nomic-embed-v1.5 entry in models/registry.toml with HuggingFace coordinates"
  - "Model loads through OnnxBackend with ModelTask::Embedding"
  - "Benchmark compares granite-embed-r2 vs nomic-embed-v1.5 on recall@5 and recall@10"
  - "Latency comparison (p50, p95) recorded for CPU"
  - "Matryoshka reduced dimensions (256, 384) produce valid search results"
  - "Summary with clear recommendation on whether to switch defaults"
scope:
  - models/registry.toml
  - benchmarks/benches/
  - navra-model/src/onnx.rs
  - navra-rag/src/store.rs
verification:
  quick: "cargo test -p navra-rag"
