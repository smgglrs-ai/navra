id: NAVRA-151
title: "Binary distribution (GitHub releases + cargo-binstall)"
status: planned
priority: high
effort: 1-3d
tags: [distribution, onboarding]
description: |
  Publish prebuilt binaries for navra and navra-agent on GitHub
  releases. Add cargo-binstall metadata to Cargo.toml so
  `cargo binstall navra` works. Consider Fedora COPR for RPM
  distribution.

  As of 2026-06-28, the build is fully self-contained: ONNX Runtime
  is bundled via ort download-binaries, TLS uses rustls (no OpenSSL),
  tokenizers uses fancy-regex (no liboniguruma), and SQLite is bundled
  via rusqlite. `cargo build` works with zero system dependencies.

  Remaining steps:
  1. Add CI job to build release binaries (x86_64-linux, aarch64-linux,
     x86_64-macos, aarch64-macos)
  2. Upload to GitHub releases with checksums
  3. Add [package.metadata.binstall] to workspace Cargo.toml
  4. Optional: create Fedora COPR spec
acceptance:
  - cargo binstall navra installs a working binary
  - GitHub release includes checksums and SBOM
