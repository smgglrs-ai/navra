id: NAVRA-071
title: HTML-to-markdown conversion
status: done
priority: low
effort: S
depends_on: []
feeds: []
description: |
  Add HtmlToMarkdownHook post-hook in navra-safety-hooks that converts HTML content in CallToolResult text to clean markdown. Uses htmd crate, follows JsonCompressHook pattern. Configurable per permission set with tool-name allowlist.
acceptance:
  - "HTML in CallToolResult text converted to markdown (round-trip test)"
  - "Detection heuristic distinguishes HTML from plain text with angle brackets"
  - "Configurable: enable/disable per permission set, tool-name allowlist"
  - "At least 40% character reduction on real-world HTML page"
  - "Fires only in post_tool_use phase"
  - "Existing navra-safety-hooks tests pass"
scope:
  - navra-safety-hooks/src/hooks/html_markdown.rs
  - navra-safety-hooks/src/hooks/mod.rs
  - navra-safety-hooks/Cargo.toml
  - navra-core/src/server/builder.rs
verification:
  quick: "cargo test -p navra-safety-hooks -- html"
