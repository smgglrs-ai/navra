id: NAVRA-135
title: Consolidate rusqlite to workspace dependency
status: done
priority: medium
effort: S
depends_on: []
feeds: []
description: |
  rusqlite (with bundled feature) is defined independently in 7 crate
  Cargo.toml files: navra-agent, navra-cognitive, navra-core, navra-flow,
  navra-memory, navra-server, navra-rag. Move to [workspace.dependencies]
