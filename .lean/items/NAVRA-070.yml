id: NAVRA-070
title: WebSocket agentic loops
status: done
priority: medium
effort: M
depends_on: []
feeds: []
description: |
  Harden WebSocket transport for production agentic loops. Add server-initiated ping/keepalive, configurable idle timeout, concurrent in-flight request dispatch, fix websocket_connections metrics, and add a WebSocketTransport client in navra-protocol for navra-agent WS connections.
acceptance:
  - "Server sends ping frames at configurable interval (default 30s), closes after 3 missed pongs"
  - "Idle timeout closes connections with no activity for configurable duration (default 10m)"
  - "websocket_connections metric incremented on upgrade, decremented on close"
  - "Multiple JSON-RPC requests dispatched concurrently on same WS connection"
  - "navra-protocol provides WebSocketTransport implementing Transport trait"
  - "ServerConfig gains ws_ping_interval_secs and ws_idle_timeout_secs fields"
scope:
  - navra-core/src/transport/websocket.rs
  - navra-protocol/src/upstream/
  - navra-server/src/config/server.rs
  - navra-agent/src/client.rs
verification:
  quick: "ORT_LIB_PATH=/usr/lib64 ORT_PREFER_DYNAMIC_LINK=1 cargo test -p navra-core transport::websocket"
