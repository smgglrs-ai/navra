id: NAVRA-059
title: YAML flow definitions
status: done
priority: low
effort: M
depends_on: []
feeds: []
description: |
  Extend yaml_loader.rs to support handoff-kind flows. Currently only produces DagConfig; add LoadedFlow enum returning Dag or Handoff. Wire into flow_run tool so handoff flows from YAML files execute via FlowConfig. Add schema validation per kind.
acceptance:
  - "Loader returns LoadedFlow::Dag or LoadedFlow::Handoff based on YAML kind field"
  - "Handoff YAML files listed by flow_list with nodes, edges, parameters"
  - "flow_run executes handoff flows loaded from YAML by name"
  - "Missing required fields produce clear YamlLoadError variants"
  - "Parameter substitution works for both dag and handoff flows"
  - "Unit tests cover valid handoff YAML, missing-field errors, roundtrip"
scope:
  - navra-flow/src/yaml_loader.rs
  - navra-flow/src/lib.rs
  - navra-server/src/flow_tools.rs
verification:
  quick: "ORT_LIB_PATH=/usr/lib64 ORT_PREFER_DYNAMIC_LINK=1 cargo test -p navra-flow yaml_loader"
