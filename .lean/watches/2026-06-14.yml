summary: |
  7 sources analyzed (deep-research workflow: 101 agents, 19 sources fetched,
  94 claims extracted, 25 verified, 23 confirmed, 2 killed).
  1 new plan item (NAVRA-082: OpenAPI-to-MCP runtime bridge).
  1 existing item enriched (NAVRA-072: rmcp-openapi as replacement path).
  3 items to watch (Speakeasy scopes, Anthropic stance, openapi-mcp-generator).
  2 items dismissed (AWS Labs Python tool, Kong manual YAML).

  Key insight: all existing tools are CODE GENERATORS producing standalone
  MCP servers. navra's gateway architecture enables a fundamentally different
  approach — a RUNTIME BRIDGE where the operator adds an OpenAPI spec URL to
  config and navra exposes filtered, ACL-enforced, IFC-tracked API tools with
  zero code. No competitor does this.
