findings:
  - source: "https://datatracker.ietf.org/doc/draft-klrc-aiagent-auth/"
    title: "IETF AIMS mandates WIMSE/SPIFFE, zero DID awareness"
    action: plan
    item_id: "NAVRA-172"
    detail: "navra needs WIMSE/SPIFFE alongside DID:key — standards track ignores DIDs entirely"

  - source: "https://datatracker.ietf.org/doc/draft-mozleywilliams-dnsop-dnsaid/"
    title: "DNS-AID delegates trust to external policy systems"
    action: plan
    item_id: "NAVRA-173"
    detail: "Perfect integration point — navra is the policy system DNS-AID delegates to"

  - source: "https://agenticresourcediscovery.org/spec/"
    title: "ARD v0.9 ai-catalog.json discovery protocol"
    action: plan
    item_id: "NAVRA-174"
    detail: "Pre-invocation discovery for MCP server registry"

