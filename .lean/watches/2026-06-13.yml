summary: |
  9 sources analyzed via deep-research workflow (111 agents, 28 sources fetched,
  138 claims extracted, 24/25 verified).
  2 new plan items (NAVRA-078, NAVRA-079).
  3 existing items enriched (NAVRA-018, NAVRA-048, NAVRA-074).
  Ecosystem positioning updated (DefenseClaw, Envoy, OX STDIO RCE, Uber ADR).
  1 item to investigate (STDIO RCE exposure in navra upstream spawning).
  1 item to watch (Ollama v0.30.8 KV cache).
  1 item dismissed (ClawPatrol 9 detectors claim — refuted).

  Key insight: MCP 2026-07-28 RC is a fundamental protocol redesign (stateless,
  no sessions, no initialize). NAVRA-018 is tracking this but the authorization
  SEPs (NAVRA-078) are a new dependency for spec compliance. The OX Security
  STDIO RCE is the most urgent investigation — navra's config-only spawn params
  likely mitigate, but needs verification.
