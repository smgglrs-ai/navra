  - source: "ox.security"
    title: "STDIO RCE exposure in navra upstream MCP spawning"
    action: investigate
    resolution: |
      NOT VULNERABLE. Command params are config-only (static TOML), never
      user-influenced. No dynamic upstream registration API. AID discovery
      returns HTTP URLs only. Tool arguments are JSON-RPC over stdin pipe,
      no shell interpretation. Two minor hardening items → NAVRA-080.
    detail: "14+ CVEs across all Anthropic MCP SDKs. navra spawns upstream servers via STDIO."

  - source: "ox.security"
    title: "Upstream transport hardening (error sanitization, stderr rate-limit)"
    action: plan
    item_id: "NAVRA-080"
    detail: "Sanitize UpstreamError::Spawn (strip command path), rate-limit upstream stderr forwarding"

  - source: "ox.security"
    title: "STDIO RCE as architecture disclosure example"
    action: enrich
    item_id: "NAVRA-074"
    detail: "STDIO transport mechanism itself is exploitable architectural detail"

