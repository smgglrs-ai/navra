[package]
name = "navra-tools-exec"
description = "Exec module for navra — run commands inside OpenShell sandboxes"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[dependencies]
navra-mcp = { path = "../navra-mcp" }
navra-macros = { path = "../navra-macros" }
navra-protocol = { path = "../navra-protocol" }
navra-model-runtime = { path = "../navra-model-runtime", features = ["openshell"] }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tonic = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["test-util", "macros"] }
