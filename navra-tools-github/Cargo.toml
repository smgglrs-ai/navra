[package]
name = "navra-tools-github"
description = "GitHub forge module for navra"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[dependencies]
navra-core = { path = "../navra-core" }
navra-macros = { path = "../navra-macros" }
navra-protocol = { path = "../navra-protocol" }
navra-security = { path = "../navra-security" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
regex = "1"
glob = "0.3"

tracing-subscriber = { workspace = true }

[[bin]]
name = "navra-github"
path = "src/main.rs"

[dev-dependencies]
tokio = { workspace = true, features = ["test-util", "macros"] }
