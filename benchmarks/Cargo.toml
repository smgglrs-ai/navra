[package]
name = "myelix-benchmarks"
version = "0.1.0"
edition = "2021"
publish = false

[dev-dependencies]
myelix-security = { path = "../myelix-security" }
myelix-core = { path = "../myelix-core" }
myelix-model = { path = "../myelix-model" }
myelix-cognitive = { path = "../myelix-cognitive" }
myelix-responses = { path = "../myelix-responses" }
criterion = { version = "0.5", features = ["html_reports"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tempfile = "3"

[[bench]]
name = "security_overhead"
harness = false
