[workspace]
resolver = "2"
members = ["mcpd-core", "mcpd-mod-docs", "mcpd-server"]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "BSD-3-Clause"
rust-version = "1.75"

[workspace.dependencies]
axum = "0.8"
hyper = "1"
hyper-util = "0.1"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
uuid = { version = "1", features = ["v4"] }
