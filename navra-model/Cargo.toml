[package]
name = "navra-model"
description = "Model inference trait and backends (ONNX, OpenAI-compatible)"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[features]
default = ["onnx"]
onnx = ["dep:ort", "dep:ndarray", "dep:tokenizers"]
rustls = ["reqwest/rustls-tls"]

[dependencies]
navra-responses = { path = "../navra-responses" }
ort = { version = "2.0.0-rc.12", default-features = false, features = ["ndarray", "std"], optional = true }
ndarray = { version = "0.17", optional = true }
tokenizers = { version = "0.22", default-features = false, features = ["onig"], optional = true }
reqwest = { workspace = true, features = ["stream"] }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
futures-util = "0.3"
async-stream = "0.3"

[dev-dependencies]
tokio = { workspace = true, features = ["test-util", "macros"] }
