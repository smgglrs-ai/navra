[package]
name = "navra-server"
description = "Composable MCP server with modular architecture"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
default-run = "navra"

[[bin]]
name = "navra"
path = "src/main.rs"

[dependencies]
navra-core = { path = "../navra-core" }
navra-cognitive = { path = "../navra-cognitive" }
navra-agent = { path = "../navra-agent" }
navra-flow = { path = "../navra-flow" }
navra-memory = { path = "../navra-memory" }
navra-model = { path = "../navra-model" }
navra-model-hub = { path = "../navra-model-hub" }
navra-model-runtime = { path = "../navra-model-runtime", features = ["openshell"] }
navra-tools-file = { path = "../navra-tools-file" }
navra-tools-git = { path = "../navra-tools-git" }
navra-tools-github = { path = "../navra-tools-github" }
navra-tools-gitlab = { path = "../navra-tools-gitlab" }
navra-tools-exec = { path = "../navra-tools-exec" }
navra-rag = { path = "../navra-rag" }
navra-modal-vision = { path = "../navra-modal-vision" }
navra-modal-voice = { path = "../navra-modal-voice" }
navra-openapi = { path = "../navra-openapi" }
axum = { workspace = true }
tokio = { workspace = true }
schemars = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
uuid = { workspace = true }
toml = "0.8"
serde_yaml = "0.9"
reqwest = { workspace = true, features = ["stream"] }
rusqlite = { version = "0.32", features = ["bundled"] }
futures-util = "0.3"
async-stream = "0.3"
async-trait = "0.1"
clap = { version = "4", features = ["derive"] }
dirs = "6"
anyhow = "1"
rand = "0.8"
bs58 = { workspace = true }
ksni = "0.3"
mdns-sd = "0.18"
flume = "0.11"
urlencoding = "2"
tonic = { workspace = true }
tokio-util = "0.7"
tempfile = "3"
notify = "7"
glob = "0.3"
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"

opentelemetry = { version = "0.28", optional = true }
opentelemetry_sdk = { version = "0.28", features = ["rt-tokio"], optional = true }
opentelemetry-otlp = { version = "0.28", features = ["tonic"], optional = true }
tracing-opentelemetry = { version = "0.29", optional = true }

[features]
cedar = ["navra-core/cedar"]
otel = ["dep:opentelemetry", "dep:opentelemetry_sdk", "dep:opentelemetry-otlp", "dep:tracing-opentelemetry"]

[dev-dependencies]
tokio = { workspace = true, features = ["test-util", "macros"] }
tempfile = "3"
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"
