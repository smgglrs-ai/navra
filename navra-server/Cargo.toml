[package]
name = "navra-server"
description = "Composable MCP server with modular architecture"
homepage.workspace = true
repository.workspace = true
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
default-run = "navra"

[[bin]]
name = "navra"
path = "src/main.rs"

[dependencies]
navra-core = { path = "../navra-core", default-features = false }
rmcp = { workspace = true }
navra-safety-hooks = { path = "../navra-safety-hooks", default-features = false }
navra-cognitive = { path = "../navra-cognitive" }
navra-agent = { path = "../navra-agent", default-features = false }
navra-flow = { path = "../navra-flow", default-features = false }
navra-memory = { path = "../navra-memory", default-features = false }
navra-model = { path = "../navra-model", default-features = false }
navra-model-server = { path = "../navra-model-server", default-features = false }
navra-model-hub = { path = "../navra-model-hub" }
navra-model-runtime = { path = "../navra-model-runtime", features = ["openshell"] }
navra-macros = { path = "../navra-macros" }
navra-mcp = { path = "../navra-mcp", default-features = false }
navra-protocol = { path = "../navra-protocol" }
navra-rag = { path = "../navra-rag", default-features = false }
navra-modal-vision = { path = "../navra-modal-vision", default-features = false }
navra-modal-voice = { path = "../navra-modal-voice", default-features = false }
navra-openapi = { path = "../navra-openapi", default-features = false }
axum = { workspace = true }
tokio = { workspace = true }
schemars = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
uuid = { workspace = true }
toml = "0.8"
serde_yaml = "0.9"
reqwest = { workspace = true, features = ["stream"] }
rusqlite = { workspace = true }
futures-util = "0.3"
async-stream = "0.3"
async-trait = "0.1"
clap = { version = "4", features = ["derive"] }
dirs = "6"
anyhow = "1"
rand = "0.8"
bs58 = { workspace = true }
ksni = "0.3"
mdns-sd = "0.18"
flume = "0.11"
urlencoding = "2"
tonic = { workspace = true }
tokio-util = "0.7"
tempfile = "3"
notify = "7"
glob = "0.3"
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"

opentelemetry = { version = "0.28", optional = true }
opentelemetry_sdk = { version = "0.28", features = ["rt-tokio"], optional = true }
opentelemetry-otlp = { version = "0.28", features = ["tonic"], optional = true }
tracing-opentelemetry = { version = "0.29", optional = true }

[features]
default = ["onnx"]
onnx = [
    "navra-core/onnx", "navra-rag/onnx", "navra-model/onnx", "navra-model-server/onnx",
    "navra-safety-hooks/onnx",
    "navra-agent/onnx", "navra-flow/onnx", "navra-memory/onnx", "navra-mcp/onnx",
    "navra-modal-vision/onnx", "navra-modal-voice/onnx", "navra-openapi/onnx",
]
cedar = ["navra-core/cedar"]
otel = ["dep:opentelemetry", "dep:opentelemetry_sdk", "dep:opentelemetry-otlp", "dep:tracing-opentelemetry"]

[dev-dependencies]
tokio = { workspace = true, features = ["test-util", "macros"] }
tempfile = "3"
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"
