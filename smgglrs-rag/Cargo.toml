[package]
name = "smgglrs-rag"
description = "RAG (Retrieval-Augmented Generation) module for smgglrs"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[dependencies]
smgglrs-core = { path = "../smgglrs-core" }
smgglrs-macros = { path = "../smgglrs-macros" }
smgglrs-protocol = { path = "../smgglrs-protocol" }
smgglrs-security = { path = "../smgglrs-security" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
thiserror = { workspace = true }
rusqlite = { version = "0.32", features = ["bundled"] }
sqlite-vec = "0.1.6-alpha.2"
zerocopy = { version = "0.8", features = ["derive"] }
dirs = "6"
ort = { version = "2.0.0-rc.12", default-features = false, features = ["ndarray", "std"] }
ndarray = "0.17"
tokenizers = { version = "0.22", default-features = false, features = ["onig"] }

[dev-dependencies]
tokio = { workspace = true, features = ["test-util", "macros"] }
tempfile = "3"
