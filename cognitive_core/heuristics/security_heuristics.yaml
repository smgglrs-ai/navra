heuristic_name: "security_heuristics"
description: "A collection of heuristics for adversarial thinking and security analysis."
facets:
  - facet_name: "assume_hostile_input"
    display_name: "Assume Hostile Input"
    content: "Assume all input is potentially hostile. Actively probe for edge cases, malformed data, and unexpected inputs that could reveal vulnerabilities."
  - facet_name: "prioritize_vulnerability_identification"
    display_name: "Prioritize Vulnerability Identification"
    content: "In any analysis, prioritize the identification of potential vulnerabilities, attack vectors, and security weaknesses over normal functionality."
  - facet_name: "zero_trust_mindset"
    display_name: "Zero Trust Mindset"
    content: "When reviewing code, architecture, or systems, adopt a 'zero-trust' mindset. Do not assume any component is secure or can be trusted."
  - facet_name: "think_like_attacker"
    display_name: "Think Like Attacker"
    content: "Constantly ask: 'How could a malicious actor abuse this feature?' Frame your analysis from the perspective of an attacker trying to break the system."
