[package]
name = "smgglrs-agent"
description = "SDK for building AI agents that connect to MCP servers"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[[bin]]
name = "smgglrs-agent"
path = "src/bin/agent.rs"

[dependencies]
smgglrs-protocol = { path = "../smgglrs-protocol" }
smgglrs-model = { path = "../smgglrs-model" }
smgglrs-security = { path = "../smgglrs-security" }
smgglrs-cognitive = { path = "../smgglrs-cognitive" }
chrono = "0.4"
regex-lite = "0.1"
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = { workspace = true }
uuid = { workspace = true }
rusqlite = { version = "0.32", features = ["bundled"] }

[dev-dependencies]
smgglrs-responses = { path = "../smgglrs-responses" }
async-trait = { workspace = true }
tokio = { workspace = true, features = ["test-util", "macros"] }
tempfile = "3"
serde_yaml = "0.9"
