[package]
name = "navra-responses"
description = "Open Responses API types for Rust — spec-compliant, no client, no runtime"
homepage.workspace = true
repository.workspace = true
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
rust-version = "1.91"
keywords = ["openresponses", "llm", "ai", "api", "types"]
categories = ["api-bindings", "data-structures"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
serde_json = "1"

[lints]
workspace = true
