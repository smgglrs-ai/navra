[package]
name = "smgglrs-tools-exec"
description = "Exec module for smgglrs — run commands inside OpenShell sandboxes"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[dependencies]
smgglrs-core = { path = "../smgglrs-core" }
smgglrs-macros = { path = "../smgglrs-macros" }
smgglrs-protocol = { path = "../smgglrs-protocol" }
smgglrs-security = { path = "../smgglrs-security" }
smgglrs-model-runtime = { path = "../smgglrs-model-runtime", features = ["openshell"] }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tonic = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["test-util", "macros"] }
